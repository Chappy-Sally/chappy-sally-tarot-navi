<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>やさしい思い出ナビ</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      font-family:"Hiragino Kaku Gothic ProN", sans-serif;
      text-align:center;
      background:#fff0f5;
      color:#6b4b2a;
      margin:0;
      padding:20px 12px 40px;
    }

    .main-card{
      width:94%;
      max-width:620px;
      margin:0 auto;
      padding:22px 16px 26px;
      background:rgba(255,255,255,0.94);
      border-radius:28px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    h1{
      margin:0 0 12px;
      font-size:27px;
      line-height:1.45;
      color:#6b4b2a;
    }

    .desc{
      margin:0 auto 18px;
      font-size:16px;
      line-height:1.75;
      color:#7b5b39;
    }

    .soft-note{
      width:94%;
      max-width:520px;
      margin:0 auto 16px;
      padding:13px 14px;
      background:#fff8dc;
      border-radius:20px;
      color:#8a6d48;
      font-size:14px;
      line-height:1.7;
    }

    .input-box{
      width:94%;
      max-width:520px;
      margin:14px auto 0;
      padding:17px 15px;
      background:#fffafd;
      border-radius:22px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
      text-align:left;
    }

    .input-title{
      margin-bottom:6px;
      font-size:18px;
      font-weight:bold;
      color:#6b4b2a;
      text-align:center;
    }

    .input-note{
      margin:0 0 14px;
      color:#947b67;
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }

    .check-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .check-item{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap:10px;
      width:100%;
      margin:0;
      padding:3px 0;
      color:#6b4b2a;
      font-size:16px;
      line-height:1.55;
      text-align:left;
      cursor:pointer;
    }

    .check-item input[type="checkbox"]{
      width:21px;
      height:21px;
      min-width:21px;
      max-width:21px;
      margin:2px 0 0;
      padding:0;
      flex:0 0 21px;
      accent-color:#a78ce5;
    }

    textarea{
      display:block;
      width:100%;
      min-height:130px;
      margin:12px auto 0;
      padding:14px 15px;
      border:2px solid #d7c5f3;
      border-radius:18px;
      background:white;
      color:#5b3a1e;
      font-family:inherit;
      font-size:16px;
      line-height:1.6;
      resize:vertical;
    }

    .button-group{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    button{
      min-width:190px;
      padding:14px 18px;
      border:none;
      border-radius:28px;
      color:white;
      font-size:16px;
      font-weight:bold;
      line-height:1.4;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    button:active{
      transform:scale(0.98);
    }

    .save-btn{
      background:linear-gradient(
        135deg,
        #c8afea,
        #a992e5,
        #8fa8e8
      );
    }

    .skip-btn{
      background:linear-gradient(
        135deg,
        #9dd8c7,
        #84cbb8
      );
    }

    .back-btn{
      background:linear-gradient(
        135deg,
        #ffbe73,
        #f6a65d
      );
    }

    @media(max-width:480px){
      h1{
        font-size:23px;
      }

      .desc{
        font-size:15px;
      }

      .check-item{
        font-size:15px;
      }

      button{
        width:100%;
        min-width:0;
        font-size:15px;
      }
    }
  </style>
</head>

<body>

  <div class="main-card">

    <h1>
      🌱 やさしい思い出ナビ 🌱
    </h1>

    <p class="desc">
      今の気持ちにつながるようなことを<br>
      もし思い出したら、教えてね😊
    </p>

    <div class="soft-note">
      無理に思い出さなくても大丈夫です🌿<br>
      話したくないことは、書かなくて大丈夫。<br>
      今のあなたが受け取れる範囲で十分だよ😊
    </div>


    <div class="input-box">

      <div class="input-title">
        思い当たるものはあるかな？
      </div>

      <p class="input-note">
        いくつ選んでも大丈夫です🌈
      </p>

      <div class="check-list">

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="子どもの頃のことで思い出したことがある"
          >
          <span>子どもの頃のことで思い出したことがある</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="お父さんとのことで心に残っていることがある"
          >
          <span>お父さんとのことで心に残っていることがある</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="お母さんとのことで心に残っていることがある"
          >
          <span>お母さんとのことで心に残っていることがある</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="子どもの頃によく言われていた言葉を思い出した"
          >
          <span>子どもの頃によく言われていた言葉を思い出した</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="先生や周りの大人から言われた言葉を思い出した"
          >
          <span>先生や周りの大人から言われた言葉を思い出した</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="我慢しなきゃと思った出来事に心当たりがある"
          >
          <span>我慢しなきゃと思った出来事に心当たりがある</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="ちゃんとしなきゃと思ったきっかけに心当たりがある"
          >
          <span>ちゃんとしなきゃと思ったきっかけに心当たりがある</span>
        </label>

        <label class="check-item">
          <input
            type="checkbox"
            class="memory-check"
            value="本当はかけてほしかった言葉がある"
          >
          <span>本当はかけてほしかった言葉がある</span>
        </label>

      </div>

    </div>


    <div class="input-box">

      <div class="input-title">
        思い出したことがあれば書いてね😊
      </div>

      <p class="input-note">
        まとまっていなくても、ひとことだけでも大丈夫です🌿
      </p>

      <textarea
        id="memoryText"
        placeholder="例：子どもの頃、よく「ちゃんとしなさい」と言われていた気がする"
      ></textarea>

    </div>


    <div class="button-group">

      <button
        class="save-btn"
        onclick="saveMemoryAndContinue()"
      >
        🌈 思い出したことを保存して<br>
        カードへ進む
      </button>

      <button
        class="skip-btn"
        onclick="skipMemory()"
      >
        🌿 今は思い出さないので<br>
        そのままカードへ進む
      </button>

    </div>


    <div class="button-group">

      <button
        class="back-btn"
        onclick="location.href='index.html'"
      >
        🏠 安心ナビに戻る
      </button>

    </div>

  </div>


  <script>
    function collectMemoryChecks(){
      const selected = [];

      document
        .querySelectorAll(".memory-check:checked")
        .forEach((checkbox) => {
          selected.push(checkbox.value);
        });

      return selected;
    }


    function saveMemoryAndContinue(){
      const selected = collectMemoryChecks();

      const memoryText =
        document
          .getElementById("memoryText")
          .value
          .trim();

      if(selected.length === 0 && !memoryText){
        const continueWithoutWriting =
          confirm(
            "今は思い出さなくても大丈夫です😊\nそのままカードへ進みますか？"
          );

        if(!continueWithoutWriting){
          return;
        }
      }

      localStorage.setItem(
        "memoryChecks",
        JSON.stringify(selected)
      );

      localStorage.setItem(
        "memoryText",
        memoryText
      );

      location.href = "boss-anshin.html";
    }


    function skipMemory(){
      localStorage.removeItem("memoryChecks");
      localStorage.removeItem("memoryText");

      location.href = "boss-anshin.html";
    }


    function loadSavedMemory(){
      const savedChecks =
        JSON.parse(
          localStorage.getItem("memoryChecks") || "[]"
        );

      document
        .querySelectorAll(".memory-check")
        .forEach((checkbox) => {
          checkbox.checked =
            savedChecks.includes(checkbox.value);
        });

      document.getElementById("memoryText").value =
        localStorage.getItem("memoryText") || "";
    }


    window.addEventListener(
      "DOMContentLoaded",
      loadSavedMemory
    );
  </script>

</body>
</html>
