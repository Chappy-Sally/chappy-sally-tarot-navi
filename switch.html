<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しあわせスイッチ</title>

  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      text-align: center;
      background: #fff0f5;
      padding: 20px;
      color: #5b3a1e;
      margin: 0;
    }

    .switch-image {
      width: 80%;
      max-width: 320px;
      border-radius: 20px;
      margin-top: 20px;
      margin-bottom: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .switch-text {
      background: rgba(255,255,255,0.88);
      padding: 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.8;
      text-align: left;
      max-width: 520px;
      margin: 0 auto 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }

    .switch-text p:last-child {
      font-weight: bold;
      margin-top: 10px;
    }

    .back-btn {
      background: linear-gradient(90deg, #eec6e6, #b7a7f6);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 24px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .switch-note {
      font-size: 15px;
      color: #8a7f76;
      margin-top: 14px;
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 28px;
      color: #ff6fa8;
      margin-top: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>🌈しあわせスイッチ</h1>

  <img
    src="https://raw.githubusercontent.com/Chappy-Sally/chappy-sally-images/main/covers/switch.png"
    alt="しあわせスイッチ"
    class="switch-image"
  >

  <div class="switch-text">
    <p>　　🌈しあわせスイッチの練習してみよう☝️</p>

    <p>　🐾今この瞬間、ホッとできることはある？</p>
    <p>　🐾小さな「よかった」を見つけてみてね😊</p>
    <p>　🐾そのよかった、ちょっと大げさに喜んでみて🤭</p>
    <p>　🐾もう、満たされてるとしたらどんな気持ち？</p>
    <p>　🐾もう、願いが叶ってるかも🤭🌿</p>

    <p>　　🌈しあわせスイッチ　入りました🌟</p>
  </div>

  <div class="button-group">
  <button
    class="back-btn"
    onclick="location.href='index.html'"
>
     🏠️ メニューへ戻る
  </button>
  </div>

</body>
</html>
